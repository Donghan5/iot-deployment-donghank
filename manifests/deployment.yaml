apiVersion: apps/v1
kind: Deployment
metadata:
  name: playground
  namespace: dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: iot-donghank
  template:
    metadata:
      labels:
        app: iot-donghank
    spec:
      containers:
      - name: iot-donghank
        image: wil42/playground:v2
        ports:
        - containerPort: 8888

---
apiVersion: v1
kind: Service
metadata:
  name: iot-service-donghank
  namespace: dev
spec:
  type: ClusterIP
  selector:
    app: iot-donghank
  ports:
  - port: 8888
    targetPort: 8888
